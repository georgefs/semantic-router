classifier:
  category_model:
    model_id: "mmbert32k_category_classifier"
    model_path: "../models/mmbert32k_category_classifier_r8"  # Trained with mmBERT-32K base
    label_mapping_path: "../models/mmbert32k_category_classifier_r8/label_mapping.json"
    threshold: 0.75
    use_cpu: true
    use_modernbert: false
    use_mmbert_32k: true  # ← Now using mmBERT-32K (MoM architecture)
    fallback_category: "other"

categories:
  - name: "biology"
    mmlu_categories:
      - "biology"
    model_scores:
      - model: "qwen2.5-coder"
        score: 0.6
      - model: "gpt-4.1"
        score: 0.85

